<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Tri-Agent Trade Desk — Pipeline</title>
<style>
  :root{--bg:#0a0e16;--panel:#11161f;--line:#1c2432;--tx:#eef2f8;--mut:#8a98ad;--faint:#5d6b7e;
    --blu:#46a8ff;--pur:#ba68c8;--grn:#16e08a;--gold:#e6c878;--red:#ff5b5b;--aqua:#26c6da}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;overflow-y:hidden;overflow-x:auto}
  #shell{position:relative;min-width:1180px;height:100%}
  body{background-image:radial-gradient(circle,#151c29 1px,transparent 1px);background-size:22px 22px}
  .topbar{position:absolute;top:0;left:0;right:0;height:52px;display:flex;align-items:center;gap:14px;padding:0 18px;
    background:rgba(10,14,22,.92);border-bottom:1px solid var(--line);z-index:50;backdrop-filter:blur(6px)}
  .dot3{display:flex;gap:6px}.dot3 span{width:11px;height:11px;border-radius:50%}
  .dot3 span:nth-child(1){background:#ff5f57}.dot3 span:nth-child(2){background:#febc2e}.dot3 span:nth-child(3){background:#28c840}
  .tb-title{font-weight:800;font-size:15px;letter-spacing:.4px}
  .tb-title small{color:var(--faint);font-weight:600;margin-left:8px;letter-spacing:1.2px;font-size:10px;text-transform:uppercase}
  .env{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--mut);font-weight:700}
  .env .live{width:8px;height:8px;border-radius:50%;background:var(--grn);box-shadow:0 0 8px var(--grn);animation:pulse 1.6s infinite}
  @keyframes pulse{50%{opacity:.4}}
  .runbtn{background:var(--gold);color:#1a1405;border:none;font-weight:800;font-size:13px;padding:8px 18px;border-radius:8px;cursor:pointer}
  .runbtn:active{transform:scale(.97)}
  #stage{position:absolute;inset:52px 0 148px 0}
  svg#wires{position:absolute;inset:0;width:100%;height:100%}
  path.wire{fill:none;stroke:#232e42;stroke-width:2.2}
  path.wire.hot{stroke-width:2.6;filter:drop-shadow(0 0 4px currentColor)}
  circle.pkt{filter:drop-shadow(0 0 5px currentColor)}
  .node{position:absolute;width:190px;background:var(--panel);border:1.5px solid var(--line);border-radius:13px;padding:11px 13px;
    transition:border-color .3s, box-shadow .3s;z-index:10}
  .node .hd{display:flex;align-items:center;gap:8px}
  .node .ic{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-size:15px;background:#0a0e16}
  .node .nm{font-size:12.5px;font-weight:800;line-height:1.15}
  .node .sub{font-size:10px;color:var(--faint);margin-top:5px;line-height:1.45}
  .node .st{position:absolute;top:9px;right:10px;width:8px;height:8px;border-radius:50%;background:#3a465c}
  .node .tm{position:absolute;bottom:-19px;right:4px;font-size:10px;color:var(--faint);font-weight:700;opacity:0;transition:opacity .3s}
  .node.active{box-shadow:0 0 22px -2px currentColor;border-color:currentColor}
  .node.active .st{background:currentColor;box-shadow:0 0 8px currentColor;animation:pulse 1s infinite}
  .node.done .st{background:var(--grn);box-shadow:0 0 6px var(--grn)}
  .node.done .tm{opacity:1}
  .node .out{margin-top:7px;font-size:10px;font-weight:700;border-radius:7px;padding:5px 8px;background:#0a0e16;color:var(--mut);
    border:1px solid var(--line);display:none;line-height:1.4}
  .node.done .out{display:block}
  .c-blu{color:var(--blu)} .c-pur{color:var(--pur)} .c-grn{color:var(--grn)} .c-gold{color:var(--gold)} .c-aqua{color:var(--aqua)} .c-red{color:var(--red)}
  #term{position:absolute;left:0;right:0;bottom:0;height:148px;background:#070a10;border-top:1px solid var(--line);
    font-family:"SF Mono",ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.75;padding:10px 16px;overflow:hidden;z-index:50}
  #term .ln{white-space:nowrap}
  #term .t{color:#3f4c63}
  #term .ok{color:var(--grn)} #term .warn{color:var(--gold)} #term .info{color:var(--blu)} #term .pur{color:var(--pur)}
  .badge{position:absolute;top:66px;right:16px;z-index:60;background:rgba(17,22,31,.95);border:1px solid var(--line);border-radius:12px;
    padding:10px 14px;font-size:11px;color:var(--mut);font-weight:700;line-height:1.7;opacity:0;transition:opacity .5s;max-width:250px}
  .badge.show{opacity:1}
  .badge b{color:var(--tx)}
  .badge .sig{color:var(--gold)}
</style>
</head>
<body>
<div id="shell">
<div class="topbar">
  <div class="dot3"><span></span><span></span><span></span></div>
  <a href="https://www.instagram.com/cloud9.markets/" target="_blank" rel="noopener" style="display:flex;align-items:center"><img src="https://kloud9ptyltd.github.io/content/cloud9-logo.png" alt="Cloud9 Markets" style="height:26px;width:auto;display:block"/></a>
  <div class="tb-title">TRI-AGENT TRADE DESK <small>production pipeline · self-hosted</small></div>
  <div class="env"><span class="live"></span> LIVE ON NAS · systemd · 17:18 ET daily</div>
  <button class="runbtn" onclick="runPipeline()">▶ Execute run</button>
</div>

<div id="stage"><svg id="wires"></svg></div>

<div class="badge" id="verdict">
  <b>👑 MASTER VERDICT — BTCUSD 4h</b><br/>
  Analyst LONG vs Oracle −4.7% vs Quant SHORT<br/>
  → <b>revised</b> · signal <span class="sig">🟡🟡 MODERATE</span><br/>
  ✓ posted to #btc-alerts · 3 charts attached
</div>

<div id="term"></div>
</div>

<script>
const NODES = [
 {id:"scan", x:0, y:.10, cls:"c-aqua", ic:"📈", nm:"US Stocks Scanner", sub:"NYSE/Nasdaq gap screener · pre/post-market", out:"21 movers · NVDA, AMD, TSLA…", tm:"2.1s"},
 {id:"btc",  x:0, y:.42, cls:"c-aqua", ic:"₿",  nm:"BTC-USD Feed",   sub:"spot · 2y daily + 6mo hourly→4h", out:"last 62,400.80", tm:"1.8s"},
 {id:"gold", x:0, y:.74, cls:"c-aqua", ic:"🥇", nm:"Gold Futures Feed", sub:"COMEX GC · 2y daily + 4h resample", out:"last 4,187.30", tm:"1.6s"},
 {id:"data", x:.26, y:.42, cls:"c-blu", ic:"🗄", nm:"Data Engine", sub:"OHLCV · RSI/ATR/SMA · swing map · features", out:"features built · 3 assets", tm:"0.9s"},
 {id:"analyst", x:.52, y:.10, cls:"c-blu", ic:"🧠", nm:"ANALYST AGENT", sub:"Claude · structure, levels, R:R ≥ 1.5", out:"LONG 4h · entry 61.9k stop 60.4k", tm:"68s"},
 {id:"oracle",  x:.52, y:.42, cls:"c-pur", ic:"🔮", nm:"ORACLE AGENT", sub:"Kronos 24.7M · predicts next 10 candles", out:"BEARISH −4.69% → 59.5k", tm:"23s"},
 {id:"quant",   x:.52, y:.74, cls:"c-grn", ic:"📐", nm:"QUANT AGENT", sub:"momentum·breakout·regime·RSI2 + backtest", out:"SHORT · receipt 46.5% / 460 signals", tm:"1.1s"},
 {id:"master", x:.78, y:.42, cls:"c-gold", ic:"👑", nm:"MASTER AGENT", sub:"deliberation · weighs all 3 · final call", out:"divergent → REVISED · 🟡🟡 MODERATE", tm:"41s"},
 {id:"chart", x:1.0, y:.24, cls:"c-red", ic:"📊", nm:"Chart Renderer", sub:"TradingView snap + Oracle path plot", out:"3 images rendered", tm:"6.2s"},
 {id:"disc",  x:1.0, y:.60, cls:"c-blu", ic:"💬", nm:"Discord Alerts", sub:"#btc-alerts · #gold-alerts · #movers", out:"✓ POSTED 22:25:13 ET", tm:"0.4s"},
];
const WIRES = [
 ["scan","data"],["btc","data"],["gold","data"],
 ["data","analyst"],["data","oracle"],["data","quant"],
 ["analyst","master"],["oracle","master"],["quant","master"],
 ["master","chart"],["chart","disc"],["master","disc"]
];
const stage = document.getElementById("stage");
const svg = document.getElementById("wires");
const XW = 190;

function place(){
  const W = stage.clientWidth, H = stage.clientHeight;
  document.querySelectorAll(".node").forEach(n=>n.remove());
  svg.innerHTML = "";
  const pos = {};
  NODES.forEach(nd=>{
    const el = document.createElement("div");
    el.className = "node "+nd.cls; el.id = "n-"+nd.id;
    el.style.left = (nd.x*(W-XW-16)+8)+"px"; el.style.top = (Math.min(nd.y*H, H-118))+"px";
    el.innerHTML = `<div class="st"></div><div class="hd"><div class="ic">${nd.ic}</div><div class="nm">${nd.nm}</div></div>
      <div class="sub">${nd.sub}</div><div class="out">${nd.out}</div><div class="tm">⏱ ${nd.tm}</div>`;
    stage.appendChild(el);
    pos[nd.id] = el;
  });
  WIRES.forEach(([a,b],i)=>{
    const ea = pos[a].getBoundingClientRect(), eb = pos[b].getBoundingClientRect(), sr = stage.getBoundingClientRect();
    const x1 = ea.right - sr.left, y1 = ea.top + ea.height/2 - sr.top;
    const x2 = eb.left - sr.left,  y2 = eb.top + eb.height/2 - sr.top;
    const dx = Math.max(40,(x2-x1)/2);
    const p = document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("d",`M ${x1} ${y1} C ${x1+dx} ${y1}, ${x2-dx} ${y2}, ${x2} ${y2}`);
    p.setAttribute("class","wire"); p.id = "w-"+a+"-"+b;
    svg.appendChild(p);
  });
}
place(); addEventListener("resize", place);

const COLORS = {analyst:"#46a8ff", oracle:"#ba68c8", quant:"#16e08a", master:"#e6c878", data:"#46a8ff",
                scan:"#26c6da", btc:"#26c6da", gold:"#26c6da", chart:"#ff5b5b", disc:"#46a8ff"};
function firePacket(a,b,color,dur=900,n=3){
  const path = document.getElementById("w-"+a+"-"+b);
  if(!path) return;
  path.classList.add("hot"); path.style.color = color; path.style.stroke = color;
  for(let i=0;i<n;i++){
    setTimeout(()=>{
      const c = document.createElementNS("http://www.w3.org/2000/svg","circle");
      c.setAttribute("r","4"); c.setAttribute("class","pkt"); c.setAttribute("fill",color); c.style.color=color;
      svg.appendChild(c);
      const L = path.getTotalLength(); const t0 = performance.now();
      (function step(t){
        const k = Math.min(1,(t-t0)/dur);
        const pt = path.getPointAtLength(k*L);
        c.setAttribute("cx",pt.x); c.setAttribute("cy",pt.y);
        if(k<1) requestAnimationFrame(step); else c.remove();
      })(t0);
    }, i*260);
  }
}
const term = document.getElementById("term");
function tlog(html, cls=""){
  const d = document.createElement("div"); d.className="ln";
  const ts = new Date(); const hh = String(ts.getHours()).padStart(2,"0"), mm = String(ts.getMinutes()).padStart(2,"0"), ss = String(ts.getSeconds()).padStart(2,"0");
  d.innerHTML = `<span class="t">[${hh}:${mm}:${ss} ET]</span> <span class="${cls}">${html}</span>`;
  term.appendChild(d);
  while(term.children.length > 7) term.removeChild(term.firstChild);
}

let running = false;
async function runPipeline(){
  if(running) return; running = true;
  document.getElementById("verdict").classList.remove("show");
  document.querySelectorAll(".node").forEach(n=>n.classList.remove("active","done"));
  document.querySelectorAll("path.wire").forEach(w=>{w.classList.remove("hot"); w.style.stroke="#232e42";});
  term.innerHTML="";
  const S = (id)=>document.getElementById("n-"+id);
  const wait = (ms)=>new Promise(r=>setTimeout(r,ms));

  tlog("mms-asset@btc.service — starting tri-agent run","info");
  for(const src of ["scan","btc","gold"]){ S(src).classList.add("active"); }
  await wait(700);
  ["scan","btc","gold"].forEach(src=>{ S(src).classList.remove("active"); S(src).classList.add("done"); firePacket(src,"data",COLORS[src]); });
  tlog("data: BTC-USD last=62,400.80 · GC=F last=4,187.30 · 21 movers loaded","ok");
  S("data").classList.add("active"); await wait(900);
  S("data").classList.remove("active"); S("data").classList.add("done");
  ["analyst","oracle","quant"].forEach(a=>firePacket("data",a,COLORS[a]));
  tlog("features built → dispatching to 3 agents in parallel","info");
  await wait(500);
  ["analyst","oracle","quant"].forEach(a=>S(a).classList.add("active"));
  await wait(1400);
  S("quant").classList.remove("active"); S("quant").classList.add("done"); firePacket("quant","master",COLORS.quant);
  tlog("📐 QUANT: SHORT (momentum↓ regime↓) · receipt: 46.5% of 460 signals","ok");
  await wait(1200);
  S("oracle").classList.remove("active"); S("oracle").classList.add("done"); firePacket("oracle","master",COLORS.oracle);
  tlog("🔮 ORACLE (Kronos): BEARISH −4.69% → 59,472 over next 10×4h","pur");
  await wait(1300);
  S("analyst").classList.remove("active"); S("analyst").classList.add("done"); firePacket("analyst","master",COLORS.analyst);
  tlog("🧠 ANALYST (Claude): LONG 4h — lid break holding · entry 61.9k · R:R 2.1","info");
  await wait(400);
  S("master").classList.add("active");
  tlog("👑 MASTER: agents diverge — deliberating…","warn");
  await wait(2200);
  S("master").classList.remove("active"); S("master").classList.add("done");
  tlog("👑 MASTER: divergent/revised → signal 🟡🟡 MODERATE","warn");
  firePacket("master","chart",COLORS.chart); firePacket("master","disc",COLORS.disc,1400,2);
  S("chart").classList.add("active"); await wait(1100);
  S("chart").classList.remove("active"); S("chart").classList.add("done"); firePacket("chart","disc",COLORS.disc);
  tlog("charts: trade-plan + oracle-path + analyst-view rendered","ok");
  await wait(700);
  S("disc").classList.add("active"); await wait(700);
  S("disc").classList.remove("active"); S("disc").classList.add("done");
  tlog("✓ POSTED to Discord #btc-alerts — 3 embeds, 3 images","ok");
  document.getElementById("verdict").classList.add("show");
  running = false;
}
setTimeout(runPipeline, 900);
document.addEventListener("keydown", e=>{ if(e.key==="r"||e.key==="R") runPipeline(); });
</script>
</body>
</html>
