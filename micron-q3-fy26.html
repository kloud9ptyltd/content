<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Micron Q3 FY26 — Cloud9 Markets Equity Brief</title>
<meta name="description" content="Cloud9 Markets interactive equity brief: Micron (MU) Q3 FY26 earnings, value chain, bull/bear/base cases, analyst consensus, and a final verdict with target price." />
<meta property="og:title" content="Micron Q3 FY26 — Cloud9 Markets Equity Brief" />
<meta property="og:description" content="A record $41.5B quarter, decoded. Earnings, ecosystem, scenarios and a Cloud9 verdict — interactive." />
<meta property="og:type" content="article" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
<style>
  /* =====================================================================
     CLOUD9 EQUITY BRIEF — reusable luxury template.
     ALL content lives in the REPORT object at the bottom of this file.
     To build another company (NVDA, AAPL...), copy this file and swap REPORT.
     ===================================================================== */
  :root{
    --bg:#06080D;--bg2:#080B12;--panel:rgba(255,255,255,.025);--panel2:rgba(255,255,255,.05);
    --glass:rgba(20,28,44,.55);--line:rgba(255,255,255,.09);--line2:rgba(255,255,255,.055);
    --text:#F1F4FA;--muted:#9AA7BD;--faint:#5E6B82;
    --c9:#46A8FF;--c9deep:#1E6FE0;
    --gold:#E6D2A8;--gold2:#C9AE76;
    --bull:#43D6A0;--bear:#FF6B7A;--base:#E6B354;--violet:#B49BF5;
    --pos:#43D6A0;--neg:#FF6B7A;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(1100px 620px at 78% -6%,rgba(70,168,255,.13),transparent 60%),
      radial-gradient(820px 560px at -8% 8%,rgba(67,214,160,.06),transparent 55%),
      radial-gradient(900px 700px at 50% 120%,rgba(230,210,168,.05),transparent 60%);
    background-attachment:fixed;}
  .serif{font-family:"Fraunces",Georgia,serif}
  .mono{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace}
  a{color:var(--c9);text-decoration:none}a:hover{text-decoration:underline}
  .wrap{max-width:1120px;margin:0 auto;padding:0 24px}
  .pos{color:var(--pos)}.neg{color:var(--neg)}
  .eyebrow{font-family:"JetBrains Mono";font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold)}

  /* glass + hairline luxe */
  .glass{background:var(--panel);border:1px solid var(--line);border-radius:18px;
    box-shadow:0 1px 0 rgba(255,255,255,.04) inset,0 30px 60px -30px rgba(0,0,0,.7);backdrop-filter:blur(10px)}

  /* ---------- top bar ---------- */
  .topbar{position:sticky;top:0;z-index:60;background:rgba(6,8,13,.72);backdrop-filter:blur(16px);border-bottom:1px solid var(--line2)}
  .topbar .wrap{display:flex;align-items:center;gap:18px;height:58px}
  .brand{display:flex;align-items:center;gap:11px;white-space:nowrap}
  .brand .logo{width:30px;height:30px}
  .brand .logo-img{height:34px;width:auto;display:block;mix-blend-mode:screen}
  .brand .bn{font-family:"Fraunces";font-weight:600;font-size:17px;letter-spacing:.01em}
  .brand .bn b{color:var(--c9)}
  .brand small{display:block;color:var(--faint);font-family:"JetBrains Mono";font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;margin-top:1px}
  nav.secnav{display:flex;gap:2px;margin-left:auto;overflow-x:auto;scrollbar-width:none}
  nav.secnav::-webkit-scrollbar{display:none}
  nav.secnav a{font-size:12.5px;font-weight:500;color:var(--muted);padding:7px 12px;border-radius:9px;white-space:nowrap;letter-spacing:.01em}
  nav.secnav a:hover{color:var(--text);text-decoration:none;background:var(--panel2)}
  nav.secnav a.on{color:var(--gold);background:rgba(230,210,168,.08)}

  /* ---------- hero ---------- */
  header.hero{padding:64px 0 48px;position:relative;overflow:hidden}
  .tickrow{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:22px}
  .tickbadge{display:flex;align-items:center;gap:11px;padding:9px 15px;border-radius:13px;border:1px solid var(--line)}
  .tickbadge .sym{font-family:"JetBrains Mono";font-weight:700;font-size:15px;color:var(--c9)}
  .tickbadge .exch{font-family:"JetBrains Mono";font-size:10px;color:var(--faint);letter-spacing:.05em}
  .tickbadge .nm{font-size:13px;color:var(--muted)}
  .period{font-family:"JetBrains Mono";font-size:11px;color:var(--muted);letter-spacing:.04em;display:flex;align-items:center;gap:9px}
  .period .pulse{width:7px;height:7px;border-radius:50%;background:var(--bull);box-shadow:0 0 12px var(--bull);animation:pulse 2.4s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  h1.title{font-family:"Fraunces";font-weight:600;font-size:clamp(34px,5.6vw,62px);line-height:1.02;letter-spacing:-.02em;margin:0;max-width:16ch}
  h1.title em{font-style:italic;color:var(--gold)}
  .lede{color:var(--muted);font-size:17px;line-height:1.62;max-width:680px;margin:22px 0 0}
  .lede b{color:var(--text);font-weight:600}
  .pricestrip{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;margin-top:36px;background:var(--line2);border:1px solid var(--line);border-radius:18px;overflow:hidden}
  .pchip{background:var(--bg2);padding:18px 20px}
  .pchip .lab{font-family:"JetBrains Mono";font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint)}
  .pchip .val{font-family:"Fraunces";font-weight:600;font-size:24px;margin-top:7px;letter-spacing:-.01em}
  .pchip .sub{font-size:11.5px;color:var(--muted);margin-top:4px}

  /* ---------- section frame ---------- */
  section{padding:64px 0;border-top:1px solid var(--line2)}
  .sechead{margin-bottom:34px;max-width:760px}
  .sechead .eyebrow{display:block;margin-bottom:13px}
  h2{font-family:"Fraunces";font-weight:600;font-size:clamp(26px,3.8vw,38px);letter-spacing:-.02em;margin:0 0 12px;line-height:1.08}
  .sintro{color:var(--muted);font-size:15.5px;line-height:1.65}
  .sintro b{color:var(--text)}

  /* ---------- KPI grid ---------- */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:14px}
  .kpi{padding:20px;position:relative;overflow:hidden}
  .kpi .k{font-family:"JetBrains Mono";font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint)}
  .kpi .v{font-family:"Fraunces";font-weight:600;font-size:34px;margin-top:9px;letter-spacing:-.02em;line-height:1}
  .kpi .yoy{font-family:"JetBrains Mono";font-size:12px;font-weight:600;margin-top:9px;display:inline-block}
  .kpi .beat{font-size:11px;color:var(--muted);margin-top:6px}
  .kpi .glow{position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(70,168,255,.14),transparent 70%)}

  /* ---------- income flow ---------- */
  .flowwrap{padding:26px 26px 12px;margin-top:18px}
  .flowwrap h3{font-family:"Fraunces";font-weight:600;font-size:17px;margin:0 0 4px}
  .flowwrap .hint{font-size:12px;color:var(--faint);margin:0 0 22px}
  .frow{margin-bottom:16px;cursor:pointer}
  .frow .ft{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:7px}
  .frow .fn{font-family:"JetBrains Mono";font-size:12.5px;font-weight:600}
  .frow .fn .pc{color:var(--faint);font-weight:500;margin-left:8px}
  .frow .fv{font-family:"Fraunces";font-weight:600;font-size:17px;white-space:nowrap}
  .track{height:14px;background:rgba(255,255,255,.045);border-radius:8px;overflow:hidden;position:relative}
  .fill{height:100%;width:0;border-radius:8px;transition:width 1.2s cubic-bezier(.22,1,.36,1)}
  .frow .det{font-size:12.5px;color:var(--muted);line-height:1.55;max-height:0;overflow:hidden;transition:max-height .4s ease,margin .4s ease}
  .frow.open .det{max-height:150px;margin-top:11px}
  .frow .det b{color:var(--text)}
  .fl-rev{background:linear-gradient(90deg,var(--c9deep),var(--c9))}
  .fl-profit{background:linear-gradient(90deg,#1f9e74,var(--bull))}
  .fl-cost{background:linear-gradient(90deg,#b04654,var(--bear))}

  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
  .card{padding:22px}
  .card h3{font-family:"Fraunces";font-weight:600;font-size:15px;margin:0 0 14px;display:flex;align-items:center;gap:9px}
  .drow{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-top:1px solid var(--line2);font-size:13px}
  .drow:first-of-type{border-top:none}
  .drow .l{color:var(--muted)}
  .drow .r{font-family:"JetBrains Mono";font-weight:600;text-align:right}
  .drow .r .was{color:var(--faint);font-weight:400;font-size:10.5px}

  /* ---------- segments ---------- */
  .segs{display:grid;grid-template-columns:repeat(auto-fit,minmax(232px,1fr));gap:14px}
  .seg{padding:20px;cursor:pointer;transition:transform .18s,border-color .18s}
  .seg:hover{transform:translateY(-4px);border-color:rgba(180,155,245,.5)}
  .seg .top{display:flex;align-items:center;gap:11px}
  .seg .emoji{font-size:23px}
  .seg .nm{font-family:"Fraunces";font-weight:600;font-size:15px;line-height:1.1}
  .seg .rev{font-family:"Fraunces";font-weight:600;font-size:30px;margin:16px 0 2px;letter-spacing:-.02em}
  .seg .yoy{font-family:"JetBrains Mono";font-size:12px;font-weight:600;color:var(--pos)}
  .seg .opm{font-size:11.5px;color:var(--muted);margin-top:9px;display:flex;justify-content:space-between}
  .seg .barbg{height:6px;background:rgba(255,255,255,.06);border-radius:4px;margin-top:8px;overflow:hidden}
  .seg .barfg{height:100%;background:linear-gradient(90deg,#7a5cf0,var(--violet));border-radius:4px;width:0;transition:width 1.1s ease}
  .seg .more{font-size:12px;color:var(--muted);line-height:1.55;max-height:0;overflow:hidden;transition:max-height .4s ease,margin .4s ease}
  .seg.open .more{max-height:200px;margin-top:13px;padding-top:13px;border-top:1px solid var(--line2)}
  .seg .more b{color:var(--text)}

  /* ---------- VALUE CHAIN ---------- */
  .chainflow{display:grid;grid-template-columns:1fr auto 1fr;gap:18px;align-items:stretch;margin-bottom:30px}
  .chaincol .colhead{font-family:"JetBrains Mono";font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
  .chaincol.up .colhead{color:var(--gold)}
  .chaincol.down .colhead{color:var(--c9)}
  .chaincol .colsub{font-size:11.5px;color:var(--faint);margin-bottom:14px}
  .node{padding:13px 15px;margin-bottom:10px;cursor:pointer;transition:transform .15s,border-color .15s,background .15s;border-radius:14px;background:var(--panel);border:1px solid var(--line)}
  .node:hover{transform:translateX(var(--shift,0));background:var(--panel2)}
  .chaincol.up .node{--shift:4px} .chaincol.down .node{--shift:-4px}
  .node.lit{border-color:var(--gold);background:rgba(230,210,168,.07)}
  .chaincol.down .node.lit{border-color:var(--c9);background:rgba(70,168,255,.08)}
  .node .nh{display:flex;align-items:baseline;gap:9px}
  .node .ntk{font-family:"JetBrains Mono";font-weight:700;font-size:12px;color:var(--text)}
  .node .nnm{font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .node .nrole{font-size:11.5px;color:var(--faint);margin-top:4px;line-height:1.4}
  .node .nwhy{font-size:11.5px;color:var(--muted);line-height:1.5;max-height:0;overflow:hidden;transition:max-height .35s ease,margin .35s ease}
  .node.open .nwhy{max-height:160px;margin-top:9px}
  .node .nwhy b{color:var(--text)}
  .chaincenter{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:172px}
  .corebox{text-align:center;padding:26px 20px;border-radius:20px;background:linear-gradient(160deg,rgba(70,168,255,.16),rgba(70,168,255,.03));border:1px solid var(--c9);box-shadow:0 0 50px rgba(70,168,255,.18)}
  .corebox .clogo{width:46px;height:46px;margin:0 auto 10px}
  .corebox .csym{font-family:"JetBrains Mono";font-weight:700;font-size:20px;color:var(--c9)}
  .corebox .cnm{font-family:"Fraunces";font-weight:600;font-size:15px;margin-top:2px}
  .corebox .cnote{font-size:11px;color:var(--muted);margin-top:9px;line-height:1.5;max-width:160px}
  .flowarrow{font-size:18px;color:var(--faint);margin:8px 0}
  .ripple{padding:24px}
  .ripple h3{font-family:"Fraunces";font-weight:600;font-size:17px;margin:0 0 4px}
  .ripple .hint{font-size:12.5px;color:var(--faint);margin:0 0 18px;line-height:1.55}
  .ripple .hint b{color:var(--text)}
  .rgroup{margin-bottom:16px}
  .rgroup .rgl{font-family:"JetBrains Mono";font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--gold);margin-bottom:9px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{padding:7px 12px;border-radius:11px;background:var(--panel);border:1px solid var(--line);cursor:pointer;transition:.15s;font-size:12px;display:flex;align-items:center;gap:8px}
  .chip:hover{border-color:var(--c9);background:var(--panel2)}
  .chip .ct{font-family:"JetBrains Mono";font-weight:700;font-size:11.5px;color:var(--c9)}
  .chip .cn{color:var(--muted)}
  .rdetail{margin-top:6px;font-size:13px;color:var(--muted);line-height:1.6;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:15px 17px;min-height:54px}
  .rdetail b{color:var(--text)}
  .rdetail .rd-t{font-family:"JetBrains Mono";font-weight:700;color:var(--c9);font-size:12.5px;letter-spacing:.03em}

  /* ---------- scenarios ---------- */
  .scentabs{display:flex;gap:10px;margin-bottom:22px;flex-wrap:wrap}
  .scentab{font-family:"Fraunces";font-weight:600;font-size:14.5px;padding:12px 22px;border-radius:13px;cursor:pointer;border:1px solid var(--line);background:var(--panel);color:var(--muted);display:flex;align-items:center;gap:10px;transition:.15s}
  .scentab .d{width:9px;height:9px;border-radius:50%}
  .scentab:hover{color:var(--text)}
  .scentab[data-s="bull"].on{background:rgba(67,214,160,.14);border-color:var(--bull);color:var(--bull)}
  .scentab[data-s="base"].on{background:rgba(230,179,84,.14);border-color:var(--base);color:var(--base)}
  .scentab[data-s="bear"].on{background:rgba(255,107,122,.14);border-color:var(--bear);color:var(--bear)}
  .scentab[data-s="bull"] .d{background:var(--bull)}.scentab[data-s="base"] .d{background:var(--base)}.scentab[data-s="bear"] .d{background:var(--bear)}
  .scenpanel{display:none}.scenpanel.on{display:block;animation:fade .4s ease}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .scengrid{display:grid;grid-template-columns:1.65fr 1fr;gap:18px}
  .scenmain{padding:26px}
  .scenmain h3{font-family:"Fraunces";font-weight:600;font-size:20px;margin:0 0 5px;font-style:italic}
  .scenmain .tag{font-family:"JetBrains Mono";font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px}
  .scenmain ul{margin:0;padding:0;list-style:none}
  .scenmain li{position:relative;padding:11px 0 11px 26px;font-size:13.5px;line-height:1.55;border-top:1px solid var(--line2);color:var(--text)}
  .scenmain li:first-child{border-top:none}
  .scenmain li::before{content:"";position:absolute;left:2px;top:17px;width:8px;height:8px;border-radius:2px}
  .scenmain li b{color:#fff}
  .scenmain.bull li::before{background:var(--bull)}.scenmain.base li::before{background:var(--base)}.scenmain.bear li::before{background:var(--bear)}
  .scenside{display:flex;flex-direction:column;gap:16px}
  .targetcard{border-radius:18px;padding:24px;text-align:center;border:1px solid var(--line);background:var(--panel)}
  .targetcard .lab{font-family:"JetBrains Mono";font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint)}
  .targetcard .pt{font-family:"Fraunces";font-weight:600;font-size:46px;letter-spacing:-.02em;margin:8px 0 2px}
  .targetcard .ret{font-family:"JetBrains Mono";font-size:14px;font-weight:600}
  .targetcard .px{font-size:11.5px;color:var(--muted);margin-top:10px}
  .targetcard.bull .pt{color:var(--bull)}.targetcard.base .pt{color:var(--base)}.targetcard.bear .pt{color:var(--bear)}
  .probcard{padding:18px}
  .probcard .lab{font-family:"JetBrains Mono";font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-bottom:9px}
  .probcard .pbar{height:10px;background:rgba(255,255,255,.06);border-radius:6px;overflow:hidden}
  .probcard .pfill{height:100%;border-radius:6px;width:0;transition:width 1s ease}
  .probcard .pv{font-family:"Fraunces";font-weight:600;font-size:20px;margin-top:9px}
  .ladder{margin-top:28px;padding:26px}
  .ladder h3{font-family:"Fraunces";font-weight:600;font-size:16px;margin:0 0 4px}
  .ladder .hint{font-size:12px;color:var(--faint);margin:0 0 24px}
  .lrow{display:flex;align-items:center;gap:14px;margin-bottom:17px}
  .lrow .ln{width:52px;font-family:"JetBrains Mono";font-size:11px;font-weight:700;text-transform:uppercase}
  .lrow .lt{flex:1;height:32px;background:rgba(255,255,255,.045);border-radius:9px;position:relative;overflow:hidden}
  .lrow .lf{position:absolute;left:0;top:0;height:100%;border-radius:9px;width:0;transition:width 1.3s cubic-bezier(.22,1,.36,1)}
  .lrow .lp{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-family:"Fraunces";font-weight:600;font-size:14px;color:#04140b}
  .lrow.bull .lf{background:linear-gradient(90deg,#1f9e74,var(--bull))}.lrow.bull .ln{color:var(--bull)}
  .lrow.base .lf{background:linear-gradient(90deg,#bd8e35,var(--base))}.lrow.base .ln{color:var(--base)}
  .lrow.bear .lf{background:linear-gradient(90deg,#b04654,var(--bear))}.lrow.bear .ln{color:var(--bear)}
  .nowline{position:relative;border-left:2px dashed var(--c9);margin-left:66px;padding:3px 0 0 11px;font-family:"JetBrains Mono";font-size:11px;color:var(--c9)}

  /* ---------- calculator ---------- */
  .calc{padding:28px}
  .calc h3{font-family:"Fraunces";font-weight:600;font-size:18px;margin:0 0 4px}
  .calc .hint{font-size:12.5px;color:var(--faint);margin:0 0 24px}
  .calcgrid{display:grid;grid-template-columns:1fr 1fr;gap:30px;align-items:center}
  .slider{margin-bottom:24px}
  .slider .sl{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .slider .sl .name{font-size:13px;color:var(--muted)}
  .slider .sl .num{font-family:"Fraunces";font-weight:600;font-size:20px;color:var(--gold)}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:4px;background:rgba(255,255,255,.08);outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--c9);cursor:pointer;border:3px solid var(--bg);box-shadow:0 0 0 1px var(--c9),0 0 16px rgba(70,168,255,.6)}
  input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--c9);cursor:pointer;border:3px solid var(--bg)}
  .calcout{text-align:center;background:var(--bg2);border:1px solid var(--line);border-radius:18px;padding:28px}
  .calcout .lab{font-family:"JetBrains Mono";font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint)}
  .calcout .big{font-family:"Fraunces";font-weight:600;font-size:52px;letter-spacing:-.02em;margin:8px 0 2px;color:var(--c9)}
  .calcout .ret{font-family:"JetBrains Mono";font-size:14px;font-weight:600}
  .calcout .ctx{font-size:11.5px;color:var(--muted);margin-top:12px;line-height:1.55}

  /* ---------- analysts ---------- */
  .anwrap{display:grid;grid-template-columns:1fr 1.25fr;gap:18px}
  .gauge{padding:26px;text-align:center}
  .gauge .rating{font-family:"Fraunces";font-weight:600;font-size:30px;color:var(--pos);letter-spacing:-.01em}
  .gauge .gsub{font-size:12px;color:var(--muted);margin-top:2px}
  .ringwrap{width:184px;height:184px;margin:16px auto 8px}

    body:[
      "<b>The business is firing on all cylinders, and the demand is contracted — not hoped-for.</b> $22B in signed supply agreements and ~$100B in remaining obligations give this cycle real visibility through 2027 — that's why we lean bullish and rate it a Buy. HBM tied to AI compute is a genuinely new demand vector, and the mix shift into data-center memory is structural, not a head-fake.",
      "<b>But we won't pretend the asymmetry is what it was at $103.</b> 85% gross margins are a peak, not a baseline — memory always mean-reverts, capex is enormous, and SK Hynix / Samsung can compress HBM pricing. With the stock above the average Street target and a $249–$1,750 target spread, the smart play is to <b>accumulate on weakness, not chase the earnings spike.</b> Build it patiently and size it so a cycle-turn doesn't hurt."
    ],

  <p class="sintro">One quarter, three completely different futures. It all comes down to one question: <b>is this a structural new demand vector, or a cyclical peak?</b> Switch between the cases.</p></div>
  <div class="scentabs">
    <button class="scentab on" data-s="bull"><span class="d"></span>Bull case</button>
    <button class="scentab" data-s="base"><span class="d"></span>Base case</button>
    <button class="scentab" data-s="bear"><span class="d"></span>Bear case</button>
  </div>
  ${["bull","base","bear"].map((s,i)=>{const sc=R.scenarios[s];return `<div class="scenpanel ${i===0?'on':''}" data-p="${s}"><div class="scengrid">
    <div class="scenmain ${s} glass"><h3 class="serif">${sc.title}</h3><div class="tag" style="color:${sc.tagColor}">${sc.tag}</div><ul>${sc.pts.map(p=>`<li>${p}</li>`).join('')}</ul></div>
    <div class="scenside">
      <div class="targetcard ${s}"><div class="lab">${s} case · 12-mo target</div><div class="pt">${sc.pt}</div><div class="ret ${sc.retCls}">${sc.ret}</div><div class="px">${sc.px}</div></div>
      <div class="probcard glass"><div class="lab">Cloud9 subjective odds</div><div class="pbar"><div class="pfill" style="background:var(--${s})" data-w="${sc.odds}"></div></div><div class="pv" style="color:var(--${s})">~${sc.odds}%</div></div>
    </div></div></div>`;}).join('')}
  <div class="ladder glass"><h3 class="serif">The three targets, side by side</h3><p class="hint">${R.ladder.note}</p>
    ${R.ladder.rows.map(r=>`<div class="lrow ${r.cls}"><div class="ln">${r.ln}</div><div class="lt"><div class="lf" data-w="${r.w}"><span class="lp">${r.lp}</span></div></div></div>`).join('')}
    <div class="nowline">${R.ladder.now}</div>
  </div>
</div></section>

<section id="calc"><div class="wrap">
  <div class="sechead"><span class="eyebrow">05 — Build Your Own</span><h2>Price-target calculator</h2>
  <p class="sintro">Don't take our word for it — <b>run your own numbers.</b> Pick the annual EPS you believe in and the multiple you'd pay. Implied value updates live. (Q4 guidance alone implies a ~$120–128 annualized EPS run-rate.)</p></div>
  <div class="calc glass">
    <h3 class="serif">Implied value = EPS × P/E multiple</h3>
    <p class="hint">A framework, not a model — memory earnings are cyclical, so the 'right' EPS and multiple are exactly what the bull/bear debate is about.</p>
    <div class="calcgrid">
      <div>
        <div class="slider"><div class="sl"><span class="name">Annualized EPS you believe in</span><span class="num" id="epsv">$${R.calc.eps.val}</span></div><input type="range" id="eps" min="${R.calc.eps.min}" max="${R.calc.eps.max}" value="${R.calc.eps.val}" step="${R.calc.eps.step}"></div>
        <div class="slider"><div class="sl"><span class="name">P/E multiple you'd pay</span><span class="num" id="pev">${R.calc.pe.val.toFixed(1)}×</span></div><input type="range" id="pe" min="${R.calc.pe.min}" max="${R.calc.pe.max}" value="${R.calc.pe.val}" step="${R.calc.pe.step}"></div>
      </div>
      <div class="calcout"><div class="lab">Implied share price</div><div class="big" id="impl">—</div><div class="ret" id="implret">—</div><div class="ctx">${R.calc.note}</div></div>
    </div>
  </div>
</div></section>

<section id="analysts"><div class="wrap">
  <div class="sechead"><span class="eyebrow">06 — The Street</span><h2>What Wall Street says</h2>
  <p class="sintro">Consensus is overwhelmingly bullish on rating — but the <b>price-target dispersion is enormous</b>, exactly what you'd expect at a cycle peak nobody can agree about.</p></div>
  <div class="anwrap">
    <div class="gauge glass"><div class="rating serif">${R.analysts.rating}</div><div class="gsub">${R.analysts.sub}</div>
      <div class="ringwrap"><svg viewBox="0 0 184 184" width="184" height="184">
        <circle cx="92" cy="92" r="72" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="20"/>
        <circle id="ring" cx="92" cy="92" r="72" fill="none" stroke="url(#rg)" stroke-width="20" stroke-linecap="round" transform="rotate(-90 92 92)" stroke-dasharray="452" stroke-dashoffset="452"/>
        <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#43D6A0"/><stop offset="1" stop-color="#46A8FF"/></linearGradient></defs>
        <text x="92" y="86" text-anchor="middle" font-family="Fraunces,serif" font-weight="600" font-size="36" fill="#F1F4FA">${R.analysts.buyPct}%</text>
        <text x="92" y="108" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9.5" fill="#9AA7BD">${R.analysts.buyLabel}</text>
      </svg></div>
      <div class="ratebars">${R.analysts.bars.map(b=>`<div class="rb"><span class="rl">${b.l}</span><span class="rt"><span class="rf" style="background:${b.c}" data-w="${b.w}"></span></span><span class="rn">${b.n}</span></div>`).join('')}</div>
    </div>
    <div>
      <div class="pt3">${R.analysts.targets.map(t=>`<div class="ptrow glass"><div><div class="pl">${t.pl}</div><div class="pf">${t.pf}</div></div><div class="pn ${t.cls||''}">${t.pn}</div></div>`).join('')}</div>
      <div class="dispnote">${R.analysts.note}</div>
    </div>
  </div>
</div></section>

<section id="verdict" style="border-bottom:none"><div class="wrap">
  <div class="sechead"><span class="eyebrow">07 — The Cloud9 Call</span><h2>Final assessment</h2>
  <p class="sintro">Our opinion, framed as opinion. We weight the structural case more than the perma-bears — but after a ~10× run with the consensus target already behind us, the risk/reward is no longer one-sided.</p></div>
  <div class="verdict glass">
    <div class="vtop"><div class="ratingbadge serif">${R.verdict.rating}</div><div class="vt serif">${R.verdict.headline}<small>${R.verdict.sub}</small></div></div>
    <div class="vtgts">${R.verdict.tiles.map(t=>`<div class="vtg"><div class="l">${t.l}</div><div class="v" style="${t.vc?`color:${t.vc}`:''}">${t.html?t.v.replace('$1,750','<span style=\"color:var(--bull)\">$1,750</span>').replace('$300','<span style=\"color:var(--bear)\">$300</span>'):t.v}</div><div class="s ${t.sc||''}">${t.s}</div></div>`).join('')}</div>
    <div class="vbody">${R.verdict.body.map(p=>`<p>${p}</p>`).join('')}</div>
    <div class="watchlist">
      <div class="wl up"><h4>${R.verdict.up.title}</h4><ul>${R.verdict.up.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>
      <div class="wl down"><h4>${R.verdict.down.title}</h4><ul>${R.verdict.down.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>
    </div>
  </div>
  <div class="disclaimer glass">${R.disclaimer}</div>
</div></section>

<footer><div class="wrap">
  <img class="footlogo" src="${LOGO_FULL}" alt="Cloud9 Markets">
  <div class="soc serif"><span class="c9">Markets. AI. Opportunities.</span></div>
  <div>${R.brand.handle} · Built for our community 🎥</div>
  <div class="sources">Sources: ${R.sources.map(s=>`<a href="${s.u}" target="_blank" rel="noopener">${s.t}</a>`).join(' · ')}. Figures as of Jun 24–25, 2026.</div>
  <div class="finedisc"><b>Disclaimer:</b> This content is for information and education only. It is <b>our opinion, not financial advice</b>, and not a recommendation, solicitation, or offer to buy or sell any security. We are not your financial advisor. Markets are risky and you can lose money — <b>always do your own research</b> and consult a licensed professional before investing. © 2026 Cloud9 Markets.</div>
</div></footer>`;

/* ---------- interactions ---------- */
(function(){
  "use strict";
  const navlinks=[...document.querySelectorAll('.secnav a')];
  const secs=navlinks.map(a=>document.querySelector(a.getAttribute('href')));
  function spy(){let y=window.scrollY+130,idx=0;secs.forEach((s,i)=>{if(s&&s.offsetTop<=y)idx=i;});navlinks.forEach((a,i)=>a.classList.toggle('on',i===idx));}
  window.addEventListener('scroll',spy,{passive:true});spy();

  function animate(root){
    root.querySelectorAll('[data-w]').forEach(el=>{el.style.width=el.getAttribute('data-w')+'%';});
    root.querySelectorAll('.seg .barfg').forEach(el=>{el.style.width=el.closest('.seg').getAttribute('data-opm')+'%';});
  }
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){animate(e.target);io.unobserve(e.target);}}),{threshold:0.15});
  document.querySelectorAll('#flow,.segs,.ladder,.scenside,.ratebars').forEach(el=>io.observe(el));

  const ringIO=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){const r=document.getElementById('ring');if(r){r.style.transition='stroke-dashoffset 1.4s cubic-bezier(.22,1,.36,1)';r.style.strokeDashoffset=452*(1-R.analysts.buyPct/100);}ringIO.unobserve(e.target);}}),{threshold:0.3});
  const g=document.querySelector('.gauge');if(g)ringIO.observe(g);

  document.querySelectorAll('#flow .frow').forEach(r=>r.addEventListener('click',()=>r.classList.toggle('open')));
  document.querySelectorAll('.seg').forEach(s=>s.addEventListener('click',()=>s.classList.toggle('open')));
  document.querySelectorAll('.chain .node').forEach(n=>n.addEventListener('click',()=>n.classList.toggle('open')));

  // scenario tabs
  const tabs=document.querySelectorAll('.scentab'),panels=document.querySelectorAll('.scenpanel');
  tabs.forEach(t=>t.addEventListener('click',()=>{const s=t.dataset.s;tabs.forEach(x=>x.classList.toggle('on',x===t));panels.forEach(p=>{const on=p.dataset.p===s;p.classList.toggle('on',on);if(on)animate(p);});}));

  // ripple chips
  const rd=document.getElementById('rdetail');
  document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
    document.querySelectorAll('.chip').forEach(x=>x.style.borderColor='');
    c.style.borderColor='var(--c9)';
    const it=R.chain.groups[c.dataset.g].items[c.dataset.i];
    rd.innerHTML=`<span class="rd-t">${it.tk} · ${it.nm}</span> — ${it.why}`;
  }));

  // calculator
  const eps=document.getElementById('eps'),pe=document.getElementById('pe'),epsv=document.getElementById('epsv'),pev=document.getElementById('pev'),impl=document.getElementById('impl'),implret=document.getElementById('implret'),P=R.calc.price;
  const fmt=n=>'$'+Math.round(n).toLocaleString('en-US');
  function calc(){const e=+eps.value,m=+pe.value;epsv.textContent='$'+e;pev.textContent=m.toFixed(1)+'×';const v=e*m;impl.textContent=fmt(v);const ret=(v/P-1)*100;implret.textContent='≈ '+(ret>=0?'+':'')+ret.toFixed(0)+'% vs '+fmt(P);implret.className='ret '+(ret>=0?'pos':'neg');}
  eps.addEventListener('input',calc);pe.addEventListener('input',calc);calc();

  /* ---------- D3 interactive visuals ---------- */
  const vtip=(()=>{const t=document.createElement('div');t.id='viztip';document.body.appendChild(t);return t;})();
  function tip(e,html){vtip.innerHTML=html;vtip.style.opacity=1;const x=e.clientX||0,y=e.clientY||0;vtip.style.left=Math.min(x+15,window.innerWidth-244)+'px';vtip.style.top=Math.min(y+15,window.innerHeight-120)+'px';}
  function hideTip(){vtip.style.opacity=0;}
  const fmtB=v=>'$'+v.toFixed(1)+'B';
  const trunc=(s,n)=>s.length>n?s.slice(0,n-1)+'…':s;

  function drawSankey(){
    const host=document.getElementById('sankey'); if(!host||!window.d3||!d3.sankey) return;
    const scroll=window.innerWidth<760, avail=host.parentNode.clientWidth-2;
    const W=scroll?700:Math.max(560,avail), narrow=false, H=400;
    host.style.width=scroll?W+'px':'100%';
    const S=REPORT.sankey, COL={rev:'#46A8FF',profit:'#43D6A0',net:'#3df0b0',cost:'#FF6B7A',seg:'#B49BF5'};
    d3.select(host).selectAll('*').remove();
    const svg=d3.select(host).attr('viewBox',`0 0 ${W} ${H}`).attr('preserveAspectRatio','xMidYMid meet').style('height','auto');
    const gen=d3.sankey().nodeId(d=>d.name).nodeWidth(13).nodePadding(narrow?9:15).nodeAlign(d3.sankeyLeft).extent([[6,12],[W-6,H-12]]);
    const g=gen({nodes:S.nodes.map(d=>({...d})),links:S.links.map(d=>({...d}))});
    svg.append('g').attr('fill','none').selectAll('path').data(g.links).join('path')
      .attr('class','clink').attr('d',d3.sankeyLinkHorizontal())
      .attr('stroke',d=>COL[d.type]||'#889').attr('stroke-opacity',.34).attr('stroke-width',d=>Math.max(1.4,d.width))
      .on('mousemove',(e,d)=>tip(e,`<b>${d.source.name} → ${d.target.name}</b><br>${fmtB(d.value)}`))
      .on('mouseenter',function(){d3.select(this).attr('stroke-opacity',.7);})
      .on('mouseleave',function(){d3.select(this).attr('stroke-opacity',.34);hideTip();});
    const node=svg.append('g').selectAll('g').data(g.nodes).join('g');
    node.append('rect').attr('x',d=>d.x0).attr('y',d=>d.y0).attr('height',d=>Math.max(2,d.y1-d.y0)).attr('width',d=>d.x1-d.x0)
      .attr('rx',3).attr('fill',d=>COL[d.cat]||'#8aa').attr('stroke','rgba(255,255,255,.18)')
      .on('mousemove',(e,d)=>tip(e,`<b>${d.name}</b><br>${S.values[d.name]||''}`)).on('mouseleave',hideTip);
    const lbl=node.append('text')
      .attr('x',d=>d.x0<W/2?d.x1+8:d.x0-8).attr('y',d=>(d.y0+d.y1)/2-(narrow?3:4)).attr('text-anchor',d=>d.x0<W/2?'start':'end')
      .style('paint-order','stroke').style('stroke','#06080D').style('stroke-width','3px').style('stroke-linejoin','round')
      .attr('fill','#F1F4FA').attr('font-size',narrow?9:11).attr('font-family','"JetBrains Mono",monospace').attr('font-weight',600)
      .text(d=>narrow?trunc(d.name,13):d.name);
    node.append('text')
      .attr('x',d=>d.x0<W/2?d.x1+8:d.x0-8).attr('y',d=>(d.y0+d.y1)/2+(narrow?8:9)).attr('text-anchor',d=>d.x0<W/2?'start':'end')
      .style('paint-order','stroke').style('stroke','#06080D').style('stroke-width','3px').style('stroke-linejoin','round')
      .attr('fill',d=>COL[d.cat]||'#9AA7BD').attr('font-size',narrow?9:11).attr('font-family','"Fraunces",serif').attr('font-weight',600)
      .text(d=>S.values[d.name]||'');
  }

  function drawChainGraph(){
    const host=document.getElementById('chaingraph'); if(!host||!window.d3) return;
    const up=REPORT.chain.up, down=REPORT.chain.down;
    const scroll=window.innerWidth<760, avail=host.parentNode.clientWidth-2, narrow=false;
    const W=scroll?700:Math.max(440,avail);
    host.style.width=scroll?W+'px':'100%';
    const rows=Math.max(up.length,down.length), rowH=narrow?44:52, padY=26, H=padY*2+rows*rowH;
    const nodeW=narrow?86:116, nodeH=narrow?32:40, xL=8, xR=W-8-nodeW, xC=W/2, cw=narrow?68:88, ch=narrow?50:60, coreY=H/2;
    const yOf=(i,len)=>padY+rowH/2+i*rowH+(rows-len)*rowH/2;
    d3.select(host).selectAll('*').remove();
    const svg=d3.select(host).attr('viewBox',`0 0 ${W} ${H}`).attr('preserveAspectRatio','xMidYMid meet').style('height','auto');
    const curve=(x1,y1,x2,y2)=>{const mx=(x1+x2)/2;return `M${x1},${y1}C${mx},${y1} ${mx},${y2} ${x2},${y2}`;};
    const linkG=svg.append('g').attr('fill','none');
    up.forEach((n,i)=>linkG.append('path').attr('class','clink').attr('data-tk',n.tk).attr('d',curve(xL+nodeW,yOf(i,up.length),xC-cw/2,coreY)).attr('stroke','#E6D2A8').attr('stroke-opacity',.3).attr('stroke-width',2));
    down.forEach((n,i)=>linkG.append('path').attr('class','clink').attr('data-tk',n.tk).attr('d',curve(xC+cw/2,coreY,xR,yOf(i,down.length))).attr('stroke','#46A8FF').attr('stroke-opacity',.3).attr('stroke-width',2));
    function hl(tk){
      svg.selectAll('.clink').style('stroke-opacity',function(){return tk?(this.getAttribute('data-tk')===tk?.95:.06):null;}).style('stroke-width',function(){return tk&&this.getAttribute('data-tk')===tk?3.2:2;});
      svg.selectAll('.cgnode').style('opacity',function(){return tk?(this.getAttribute('data-tk')===tk?1:.32):1;});
    }
    function mkNode(x,y,d,side){
      const c=side==='up'?'#E6D2A8':'#46A8FF';
      const gg=svg.append('g').attr('class','cgnode').attr('data-tk',d.tk).style('cursor','pointer');
      gg.append('rect').attr('x',x).attr('y',y-nodeH/2).attr('width',nodeW).attr('height',nodeH).attr('rx',10).attr('fill','rgba(18,26,42,.9)').attr('stroke',c).attr('stroke-opacity',.55);
      gg.append('text').attr('x',x+nodeW/2).attr('y',y).attr('dy','-.08em').attr('text-anchor','middle').attr('fill',c).attr('font-family','"JetBrains Mono",monospace').attr('font-weight',700).attr('font-size',narrow?10:12).text(d.tk);
      gg.append('text').attr('x',x+nodeW/2).attr('y',y).attr('dy','1.15em').attr('text-anchor','middle').attr('fill','#9AA7BD').attr('font-size',narrow?7:8.5).text(trunc(d.nm,narrow?13:17));
      gg.on('mouseenter',e=>{hl(d.tk);tip(e,`<b>${d.tk} · ${d.nm}</b><br>${d.role||''}`);})
        .on('mousemove',e=>tip(e,`<b>${d.tk} · ${d.nm}</b><br>${d.role||''}`))
        .on('mouseleave',()=>{hl(null);hideTip();});
    }
    up.forEach((n,i)=>mkNode(xL,yOf(i,up.length),n,'up'));
    down.forEach((n,i)=>mkNode(xR,yOf(i,down.length),n,'down'));
    const core=svg.append('g');
    core.append('rect').attr('x',xC-cw/2).attr('y',coreY-ch/2).attr('width',cw).attr('height',ch).attr('rx',13).attr('fill','rgba(70,168,255,.16)').attr('stroke','#46A8FF').attr('stroke-width',1.5);
    core.append('text').attr('x',xC).attr('y',coreY).attr('dy','-.05em').attr('text-anchor','middle').attr('fill','#46A8FF').attr('font-family','"JetBrains Mono",monospace').attr('font-weight',700).attr('font-size',narrow?12:15).text('$'+REPORT.company.ticker);
    core.append('text').attr('x',xC).attr('y',coreY).attr('dy','1.25em').attr('text-anchor','middle').attr('fill','#9AA7BD').attr('font-size',narrow?7.5:9).text('Micron');
    svg.append('text').attr('x',xL+nodeW/2).attr('y',13).attr('text-anchor','middle').attr('fill','#E6D2A8').attr('font-size',9).attr('font-family','"JetBrains Mono",monospace').attr('letter-spacing','1.5').text('BUYS FROM');
    svg.append('text').attr('x',xR+nodeW/2).attr('y',13).attr('text-anchor','middle').attr('fill','#46A8FF').attr('font-size',9).attr('font-family','"JetBrains Mono",monospace').attr('letter-spacing','1.5').text('SELLS TO');
  }

  function drawAll(){ try{drawSankey();drawChainGraph();}catch(err){console.warn('viz',err);} }
  function debounce(fn,ms){let t;return()=>{clearTimeout(t);t=setTimeout(fn,ms);};}
  if(window.d3){ drawAll(); window.addEventListener('resize',debounce(drawAll,180)); }
})();
</script>
</body>
</html>
